<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 6 - Responsive Flexbox Utilities</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-custom {
            background-color: #212529;
            padding: 15px 20px;
            border-radius: 8px;
        }
        .nav-custom a {
            color: #adb5bd;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
            transition: color 0.2s;
        }
        .nav-custom a:hover {
            color: white;
        }
        .nav-brand {
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">Exercise 7.1 — Responsive Navbar with Flexbox</h2>
        <p class="text-muted mb-3">On mobile the links stack vertically. On medium screens they align in a row.</p>

        <nav class="nav-custom d-flex flex-column flex-md-row align-items-md-center">
            <span class="nav-brand me-md-4 mb-3 mb-md-0">MyBrand</span>
            <div class="d-flex flex-column flex-md-row gap-1">
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Services</a>
                <a href="#">Contact</a>
            </div>
        </nav>

        <h2 class="mt-5 mb-4">Exercise 7.2 — Card Layout with justify-content-between</h2>
        <div class="d-flex justify-content-between align-items-center p-4 border rounded bg-light">
            <div>
                <h5 class="mb-1">Product Title</h5>
                <p class="mb-0 text-muted">Short product description goes here.</p>
            </div>
            <div class="d-flex flex-column align-items-end gap-2">
                <span class="badge bg-success">In Stock</span>
                <strong>$49.99</strong>
                <button class="btn btn-primary btn-sm">Add to Cart</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
