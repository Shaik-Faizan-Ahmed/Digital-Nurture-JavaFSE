<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 9 - Buttons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">Exercise 9.1 — Contextual Button Classes</h2>

        <h5 class="mb-3">Solid Buttons</h5>
        <div class="d-flex flex-wrap gap-2 mb-4">
            <button class="btn btn-primary">Primary</button>
            <button class="btn btn-secondary">Secondary</button>
            <button class="btn btn-success">Success</button>
            <button class="btn btn-danger">Danger</button>
            <button class="btn btn-warning">Warning</button>
            <button class="btn btn-info">Info</button>
            <button class="btn btn-light">Light</button>
            <button class="btn btn-dark">Dark</button>
            <button class="btn btn-link">Link</button>
        </div>

        <h5 class="mb-3">Outline Buttons</h5>
        <div class="d-flex flex-wrap gap-2 mb-4">
            <button class="btn btn-outline-primary">Primary</button>
            <button class="btn btn-outline-secondary">Secondary</button>
            <button class="btn btn-outline-success">Success</button>
            <button class="btn btn-outline-danger">Danger</button>
            <button class="btn btn-outline-warning">Warning</button>
            <button class="btn btn-outline-info">Info</button>
            <button class="btn btn-outline-light">Light</button>
            <button class="btn btn-outline-dark">Dark</button>
        </div>

        <h5 class="mb-3">Button Sizes</h5>
        <div class="d-flex flex-wrap align-items-center gap-2 mb-4">
            <button class="btn btn-primary btn-lg">Large</button>
            <button class="btn btn-primary">Default</button>
            <button class="btn btn-primary btn-sm">Small</button>
        </div>

        <h2 class="mt-4 mb-4">Exercise 9.2 — Button Groups and Toggle Buttons</h2>

        <h5 class="mb-3">Button Group</h5>
        <div class="btn-group mb-4" role="group">
            <button type="button" class="btn btn-primary">Left</button>
            <button type="button" class="btn btn-primary">Middle</button>
            <button type="button" class="btn btn-primary">Right</button>
        </div>

        <h5 class="mb-3">Checkbox Toggle Buttons</h5>
        <div class="btn-group" role="group">
            <input type="checkbox" class="btn-check" id="option1" autocomplete="off">
            <label class="btn btn-outline-primary" for="option1">HTML</label>

            <input type="checkbox" class="btn-check" id="option2" autocomplete="off" checked>
            <label class="btn btn-outline-primary" for="option2">CSS</label>

            <input type="checkbox" class="btn-check" id="option3" autocomplete="off">
            <label class="btn btn-outline-primary" for="option3">JavaScript</label>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
