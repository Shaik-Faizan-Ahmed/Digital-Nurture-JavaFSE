<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3 - Responsive Grid Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .col-box {
            background-color: #0d6efd;
            color: white;
            padding: 30px;
            text-align: center;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">Exercise 3.1 — Responsive Three-Column Grid</h2>
        <p class="text-muted mb-4">Stacks on mobile, 2 per row on tablet, 3 per row on desktop.</p>
        <div class="row g-3">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="col-box">Column 1</div>
            </div>
            <div class="col-12 col-md-6 col-lg-4">
                <div class="col-box">Column 2</div>
            </div>
            <div class="col-12 col-md-12 col-lg-4">
                <div class="col-box">Column 3</div>
            </div>
        </div>

        <h2 class="mt-5 mb-4">Exercise 3.2 — Container, Row, and Col Classes</h2>
        <div class="container bg-light p-4 rounded">
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="p-3 bg-primary text-white rounded text-center">col-md-4</div>
                </div>
                <div class="col-md-4">
                    <div class="p-3 bg-secondary text-white rounded text-center">col-md-4</div>
                </div>
                <div class="col-md-4">
                    <div class="p-3 bg-success text-white rounded text-center">col-md-4</div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
